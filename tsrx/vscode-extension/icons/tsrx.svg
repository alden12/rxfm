<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background, bold "RX" wordmark filled with the tsrx pink->purple
       gradient (the diagonal from the original badge), so it stands out on a dark
       editor background and stays legible on light. This is the language-contributed
       icon VS Code falls back to for .tsrx when the file icon theme has no mapping. -->
  <defs>
    <linearGradient id="tsrx" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff0088"/>
      <stop offset="1" stop-color="#c551f7"/>
    </linearGradient>
  </defs>
  <text x="16" y="23" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="19" font-weight="800" fill="url(#tsrx)">RX</text>
</svg>
