<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background, bold "RX" wordmark in tsrx purple. No fill square, so
       it reads on both light and dark themes. This is the language-contributed icon
       VS Code falls back to for .tsrx when the file icon theme has no mapping. -->
  <text x="16" y="23" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="19" font-weight="800" fill="#7C3AED">RX</text>
</svg>
