<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background, bold "RTS" wordmark filled with the Reactive TS pink->purple
       gradient (the diagonal from the original badge), so it stands out on a dark
       editor background and stays legible on light. This is the language-contributed
       icon VS Code falls back to for .rts when the file icon theme has no mapping. -->
  <defs>
    <linearGradient id="rts" x1="0" y1="0" x2="16" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b03bf8"/>
      <stop offset="1" stop-color="#ef51f7"/>
    </linearGradient>
  </defs>
  <text x="0" y="23" text-anchor="start"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="19" font-weight="500" letter-spacing="-1.5"
        fill="url(#rts)">R</text>
  <text x="10.5" y="23" text-anchor="start"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="19" font-weight="500" fill="#358ef1" letter-spacing="-1.5"> TS</text>
</svg>
